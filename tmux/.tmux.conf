# Change prefix to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Improve colors
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm*:Tc'

# Reduce escape time (important for neovim)
set -sg escape-time 10

# Enable focus events (allows neovim autoread, etc.)
set -g focus-events on

# Increase scrollback buffer size
set -g history-limit 50000

# Start window numbering at 1 (RECOMMENDED - uncomment these)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Mouse support (off by default, toggle with prefix + M)
set -g mouse off
bind M set -g mouse \; display "Mouse mode: #{?mouse,ON,OFF}"

# Easy config reload
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes using | and - (open in same directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vi mode for copy mode
set -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Status bar
set -g status-style bg=black,fg=white
set -g window-status-current-style bg=white,fg=black,bold
set -g status-left-length 20
set -g status-right "#[fg=yellow]%H:%M #[fg=cyan]%Y-%m-%d"
set -g status-right-length 30
